<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>캠브리지 영어 숙제</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<meta name="theme-color" content="#4361ee">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="영어숙제">
<style>
  :root {
    --primary: #5b6cff;
    --primary-2: #8b5cf6;
    --primary-dark: #4353e8;
    --bg: #f4f6ff;
    --card: #ffffff;
    --text: #232b54;
    --muted: #8a91b4;
    --danger: #ff5a5f;
    --success: #22c55e;
    --amber: #f59e0b;
    --gold: #b8860b;
    --radius: 20px;
    --shadow: 0 6px 18px rgba(80, 95, 200, .10);
    --shadow-sm: 0 3px 10px rgba(80, 95, 200, .08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: 'Noto Sans KR', 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    background:
      radial-gradient(900px 400px at 110% -10%, rgba(139, 92, 246, .10), transparent 60%),
      radial-gradient(800px 400px at -20% 0%, rgba(91, 108, 255, .10), transparent 55%),
      var(--bg);
    color: var(--text);
    display: flex; justify-content: center;
    padding-top: env(safe-area-inset-top);
  }
  #app { width: 100%; max-width: 430px; min-height: 100%; padding: 24px 20px; display: flex; flex-direction: column; }
  h1, .brand h1, .dash-name, .step-title, .ls-title, .rc-timer, .chip, .hw-status,
  .rc-main-btn, .logout-btn, .rc-result .title { font-family: 'Jua', 'Noto Sans KR', sans-serif; font-weight: 400; }

  /* ===== 로그인 ===== */
  .brand { text-align: center; margin: 30px 0 10px; }
  .brand h1 {
    font-size: 27px; letter-spacing: 1px;
    background: linear-gradient(120deg, var(--primary), var(--primary-2));
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }
  .brand h1::before { content: '🎧 '; -webkit-text-fill-color: initial; }
  .brand p { color: var(--muted); font-size: 14px; margin-top: 8px; }

  .step-title { font-size: 19px; margin: 26px 0 14px; }
  .back-btn { background: none; border: none; color: var(--muted); font-size: 14px; padding: 10px 0; cursor: pointer; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .choice-btn {
    background: var(--card); border: 2px solid transparent; border-radius: var(--radius);
    padding: 22px 12px; font-size: 18px; font-weight: 700; color: var(--text);
    box-shadow: var(--shadow-sm); cursor: pointer; transition: transform .08s, border-color .08s;
  }
  .choice-btn:active { transform: scale(.96); border-color: var(--primary); }

  /* PIN */
  .pin-dots { display: flex; justify-content: center; gap: 18px; margin: 24px 0 10px; }
  .pin-dot { width: 18px; height: 18px; border-radius: 50%; background: #dde1f5; transition: transform .12s, background .12s; }
  .pin-dot.filled { background: linear-gradient(135deg, var(--primary), var(--primary-2)); transform: scale(1.15); }
  .pin-msg { text-align: center; min-height: 20px; font-size: 14px; color: var(--danger); margin-bottom: 8px; font-weight: 700; }
  .pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 8px; }
  .pin-key {
    background: var(--card); border: none; border-radius: 18px;
    padding: 19px 0; font-size: 24px; font-weight: 700; color: var(--text);
    box-shadow: var(--shadow-sm); cursor: pointer; transition: transform .06s;
  }
  .pin-key:active { transform: scale(.94); background: #eef0ff; }
  .pin-key.fn { font-size: 14px; color: var(--muted); background: transparent; box-shadow: none; }

  .teacher-link { margin-top: auto; padding-top: 28px; text-align: center; }
  .teacher-link button { background: none; border: none; color: var(--muted); font-size: 13px; text-decoration: underline; cursor: pointer; }

  /* ===== 로그인 후(선생님 자리표시) ===== */
  .home-card { background: var(--card); border-radius: var(--radius); padding: 30px 20px; text-align: center; box-shadow: var(--shadow); margin-top: 32px; }
  .home-card .hello { font-size: 21px; font-weight: 700; margin-bottom: 8px; }
  .home-card .note { color: var(--muted); font-size: 13px; line-height: 1.6; }
  .logout-btn {
    margin-top: 20px; background: linear-gradient(120deg, var(--primary), var(--primary-2));
    color: #fff; border: none; border-radius: 999px; padding: 13px 28px; font-size: 16px; cursor: pointer;
    box-shadow: 0 6px 14px rgba(91, 108, 255, .35);
  }

  .loading { text-align: center; color: var(--muted); padding: 56px 0; }
  .loading::before { content: '⏳'; display: block; font-size: 30px; margin-bottom: 10px; animation: spin-soft 1.6s ease-in-out infinite; }
  @keyframes spin-soft { 50% { transform: rotate(180deg); } }
  .hidden { display: none; }

  /* ===== S-01 오늘의 숙제 ===== */
  .dash-head {
    display: flex; align-items: flex-start; justify-content: space-between;
    background: linear-gradient(125deg, var(--primary) 0%, var(--primary-2) 100%);
    border-radius: var(--radius); padding: 18px 18px 42px;
    color: #fff; box-shadow: 0 10px 24px rgba(91, 108, 255, .30);
  }
  .dash-date { font-size: 13px; opacity: .85; }
  .dash-name { font-size: 21px; margin-top: 3px; letter-spacing: .5px; }
  .dash-logout { background: rgba(255,255,255,.18); border: none; color: #fff; font-size: 12px;
    border-radius: 999px; padding: 6px 12px; cursor: pointer; }
  .chips { display: flex; gap: 10px; margin: -26px 6px 6px; position: relative; }
  .chip {
    background: var(--card); border-radius: 999px; padding: 9px 16px; font-size: 14px;
    box-shadow: var(--shadow-sm); letter-spacing: .5px;
  }
  .chip.point { color: var(--gold); }
  .chip.streak { color: #e05d38; }
  .tier-box { background: var(--card); border-radius: 16px; padding: 12px 16px; margin: 10px 0; box-shadow: var(--shadow-sm); }
  .tier-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 7px; }
  .tier-row b { color: var(--text); font-size: 13px; }
  .tier-bar { height: 10px; border-radius: 5px; background: #e6e9fa; overflow: hidden; }
  .tier-bar > div {
    height: 100%; border-radius: 5px; transition: width .5s ease;
    background: linear-gradient(90deg, var(--primary), var(--primary-2), #c084fc);
    background-size: 200% 100%; animation: shine 2.5s linear infinite;
  }
  @keyframes shine { to { background-position: 200% 0; } }
  .awards {
    background: linear-gradient(120deg, #fff8e1, #fff3d6); border: 1.5px solid #f5dfa0;
    border-radius: 16px; padding: 12px 16px; margin: 8px 0; box-shadow: var(--shadow-sm);
  }
  .awards .aw-title { font-size: 12px; color: #9a7b00; font-weight: 700; margin-bottom: 5px; }
  .awards .aw-title::before { content: '✨ '; }
  .awards .aw-row { display: flex; justify-content: space-between; font-size: 14px; padding: 3px 0; }
  .awards .aw-row b { color: var(--gold); font-family: 'Jua', sans-serif; }
  .today-progress { margin: 16px 0 8px; }
  .today-progress .tp-label { display: flex; justify-content: space-between; align-items: baseline; font-size: 15px; margin-bottom: 7px; }
  .today-progress .tp-label b { font-family: 'Jua', sans-serif; font-size: 17px; font-weight: 400; }
  .today-progress .tp-label span { font-size: 13px; color: var(--muted); }
  .tp-bar { height: 12px; border-radius: 6px; background: #e6e9fa; overflow: hidden; }
  .tp-bar > div { height: 100%; background: linear-gradient(90deg, #34d399, #22c55e); border-radius: 6px; transition: width .5s ease; }
  .cards { display: flex; flex-direction: column; gap: 12px; margin-top: 12px; padding-bottom: 28px; }
  .hw-card {
    background: var(--card); border-radius: 18px; padding: 15px 14px; display: flex; align-items: center; gap: 12px;
    box-shadow: var(--shadow-sm); border-left: 6px solid transparent; cursor: pointer;
    transition: transform .08s;
  }
  .hw-card:active { transform: scale(.98); }
  .hw-card.st-redo { border-left-color: var(--danger); background: linear-gradient(90deg, #fff5f5, var(--card) 45%); }
  .hw-card.st-todo { border-left-color: var(--primary); }
  .hw-card.st-doing { border-left-color: var(--amber); }
  .hw-card.st-done { border-left-color: var(--success); opacity: .58; }
  .hw-icon {
    font-size: 22px; width: 44px; height: 44px; border-radius: 14px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; background: #eef0ff;
  }
  .st-redo .hw-icon { background: #ffecec; }
  .st-doing .hw-icon { background: #fef3e0; }
  .st-done .hw-icon { background: #e6f9ef; }
  .hw-main { flex: 1; min-width: 0; }
  .hw-subject { font-size: 11px; font-weight: 700; color: var(--primary); letter-spacing: .3px; }
  .hw-label { font-size: 16px; font-weight: 700; margin: 2px 0; }
  .hw-meta { font-size: 12px; color: var(--muted); }
  .hw-meta .overdue { color: var(--danger); font-weight: 700; }
  .hw-status { font-size: 13px; flex-shrink: 0; letter-spacing: .5px; }
  .st-redo .hw-status { color: var(--danger); }
  .st-todo .hw-status { color: var(--primary); }
  .st-doing .hw-status { color: var(--amber); }
  .st-done .hw-status { color: #189a58; }
  .empty-note { text-align: center; color: var(--muted); font-size: 15px; padding: 44px 0; line-height: 1.8; white-space: pre-line; }

  /* ===== S-02 듣기 학습 ===== */
  .ls-head { margin-bottom: 8px; }
  .ls-subject { font-size: 12px; font-weight: 700; color: var(--primary); }
  .ls-title { font-size: 21px; margin-top: 2px; }
  .ls-count { font-size: 13px; color: var(--muted); margin-top: 5px; }
  .ls-count b { color: var(--primary); font-family: 'Jua', sans-serif; font-size: 15px; }
  .ls-transcript {
    background: var(--card); border-radius: var(--radius); padding: 18px; margin: 12px 0;
    font-size: 15px; line-height: 2.0; max-height: 40vh; overflow-y: auto;
    box-shadow: var(--shadow-sm); white-space: pre-wrap;
  }
  .ls-transcript.empty { color: var(--muted); text-align: center; font-size: 14px; }
  .ls-progress { margin: 14px 0 4px; }
  .ls-bar { height: 12px; border-radius: 6px; background: #e6e9fa; overflow: hidden; }
  .ls-bar > div { height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-2)); border-radius: 6px; }
  .ls-time { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-top: 5px; }
  .ls-controls { display: flex; justify-content: center; align-items: center; gap: 18px; margin: 18px 0; }
  .ls-btn {
    border: none; border-radius: 50%; width: 62px; height: 62px; font-size: 24px;
    background: var(--card); color: var(--text); box-shadow: var(--shadow-sm); cursor: pointer;
    transition: transform .08s;
  }
  .ls-btn.main {
    width: 84px; height: 84px; font-size: 32px; color: #fff;
    background: linear-gradient(135deg, var(--primary), var(--primary-2));
    box-shadow: 0 10px 22px rgba(91, 108, 255, .40);
  }
  .ls-btn:active { transform: scale(.93); }
  .ls-btn:disabled { opacity: .4; }
  .ls-msg { text-align: center; min-height: 22px; font-size: 15px; font-weight: 700; }
  .ls-msg.good { color: #189a58; }
  .ls-msg.bad { color: var(--danger); }
  .ls-note { text-align: center; font-size: 11px; color: var(--muted); margin-top: 8px; }

  /* ===== S-03 녹음·제출 ===== */
  .rc-stage { background: var(--card); border-radius: var(--radius); padding: 28px 16px; margin: 14px 0;
    text-align: center; box-shadow: var(--shadow); }
  .rc-timer { font-size: 42px; letter-spacing: 3px; margin: 10px 0; color: var(--text); }
  .rc-state-label { font-size: 14px; color: var(--muted); min-height: 20px; }
  .rc-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: var(--danger);
    margin-right: 6px; animation: rc-blink 1s infinite; vertical-align: 1px; }
  @keyframes rc-blink { 50% { opacity: .2; } }
  .rc-main-btn {
    border: none; border-radius: 999px; padding: 17px 38px; font-size: 18px; letter-spacing: .5px;
    color: #fff; cursor: pointer; margin-top: 14px; transition: transform .08s;
    background: linear-gradient(120deg, #ff6b6f, #ff8e53); box-shadow: 0 8px 18px rgba(255, 90, 95, .35);
  }
  .rc-main-btn.stop { background: linear-gradient(120deg, #3b4368, #232b54); box-shadow: 0 8px 18px rgba(35, 43, 84, .30); }
  .rc-main-btn.submit { background: linear-gradient(120deg, var(--primary), var(--primary-2)); box-shadow: 0 8px 18px rgba(91, 108, 255, .35); }
  .rc-main-btn:disabled { opacity: .5; }
  .rc-main-btn:active { transform: scale(.96); }
  .rc-sub-btn { border: none; background: none; color: var(--muted); font-size: 14px;
    text-decoration: underline; cursor: pointer; margin-top: 16px; }
  .rc-preview { width: 100%; margin-top: 14px; }
  .rc-result { text-align: center; }
  .rc-result .big { font-size: 48px; display: inline-block; animation: pop-in .5s cubic-bezier(.2, 1.6, .4, 1); }
  @keyframes pop-in { 0% { transform: scale(0); } 100% { transform: scale(1); } }
  .rc-result .title { font-size: 22px; margin: 8px 0 4px; }
  .rc-result .sub { font-size: 13px; color: var(--muted); }
  .rc-awards { margin: 14px auto 0; max-width: 300px; text-align: left; }

  /* ===== 거울 모드 (설계결정문서 5.4) — 저장 안 하는 카메라 프리뷰, 하루 최초 1회 ===== */
  .mirror-preview {
    position: fixed; bottom: 16px; right: 16px; width: 92px; height: 122px;
    border-radius: 16px; overflow: hidden; z-index: 40;
    box-shadow: 0 6px 18px rgba(27,35,64,.28); border: 2.5px solid #fff; background: #000;
  }
  .mirror-preview video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); display: block; }
  .mirror-badge {
    position: absolute; top: 4px; left: 4px; font-size: 9px; color: #fff;
    background: rgba(0,0,0,.5); border-radius: 6px; padding: 1px 5px; z-index: 1;
  }
  .mirror-caption {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 1;
    font-size: 8.5px; color: #fff; text-align: center; letter-spacing: .3px;
    background: rgba(0,0,0,.55); padding: 2px 0;
  }
</style>
</head>
<body>
<div id="app">
  <div class="brand">
    <h1>캠브리지 영어 숙제</h1>
    <p id="brand-sub">오늘도 반가워요!</p>
  </div>

  <div id="screen-loading" class="loading">불러오는 중...</div>

  <!-- 1단계: 반 선택 -->
  <div id="screen-group" class="hidden">
    <div class="step-title">우리 반을 골라주세요</div>
    <div id="group-grid" class="grid"></div>
    <div class="teacher-link"><button onclick="App.showTeacherLogin()">선생님 로그인</button></div>
  </div>

  <!-- 2단계: 이름 선택 -->
  <div id="screen-name" class="hidden">
    <button class="back-btn" onclick="App.showGroups()">&larr; 반 다시 고르기</button>
    <div class="step-title" id="name-title">이름을 골라주세요</div>
    <div id="name-grid" class="grid"></div>
  </div>

  <!-- 3단계: PIN 입력 (학생/선생님 공용) -->
  <div id="screen-pin" class="hidden">
    <button class="back-btn" id="pin-back">&larr; 뒤로</button>
    <div class="step-title" id="pin-title">비밀번호 4자리를 눌러주세요</div>
    <div class="pin-dots">
      <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    <div class="pin-msg" id="pin-msg"></div>
    <div class="pin-pad" id="pin-pad"></div>
  </div>

  <!-- 선생님 자리표시 (4.1 현황판에서 교체) -->
  <div id="screen-home" class="hidden">
    <div class="home-card">
      <div class="hello" id="home-hello"></div>
      <div class="note" id="home-note"></div>
      <button class="logout-btn" onclick="App.logout()">로그아웃</button>
    </div>
  </div>

  <!-- S-01 오늘의 숙제 (학생 대시보드) -->
  <div id="screen-dash" class="hidden">
    <div class="dash-head">
      <div>
        <div class="dash-date" id="dash-date"></div>
        <div class="dash-name" id="dash-name"></div>
      </div>
      <button class="dash-logout" onclick="App.logout()">로그아웃</button>
    </div>
    <div class="chips">
      <div class="chip point" id="chip-point">⭐ 0P</div>
      <div class="chip streak" id="chip-streak">🔥 0일</div>
    </div>
    <div class="tier-box" id="tier-box">
      <div class="tier-row"><span>내 등급 <b id="tier-cur">Starter</b></span><span id="tier-need"></span></div>
      <div class="tier-bar"><div id="tier-fill" style="width:0%"></div></div>
    </div>
    <div class="awards hidden" id="awards-box">
      <div class="aw-title">오늘 받은 포인트</div>
      <div id="awards-list"></div>
    </div>
    <div class="today-progress">
      <div class="tp-label"><b>오늘의 숙제</b><span id="tp-count">0/0 완료</span></div>
      <div class="tp-bar"><div id="tp-fill" style="width:0%"></div></div>
    </div>
    <div class="cards" id="hw-cards"></div>
  </div>

  <!-- S-02 듣기 학습 -->
  <div id="screen-listen" class="hidden">
    <button class="back-btn" onclick="App.closeListen()">&larr; 오늘의 숙제로</button>
    <div class="ls-head">
      <div class="ls-subject" id="ls-subject"></div>
      <div class="ls-title" id="ls-title"></div>
      <div class="ls-count">🎧 유효 듣기 <b id="ls-count">0</b>/<span id="ls-required">1</span>회</div>
    </div>
    <div class="ls-transcript" id="ls-transcript"></div>
    <div class="ls-progress">
      <div class="ls-bar"><div id="ls-fill" style="width:0%"></div></div>
      <div class="ls-time"><span id="ls-cur">0:00</span><span id="ls-dur">-:--</span></div>
    </div>
    <div class="ls-controls">
      <button class="ls-btn" id="ls-restart" title="처음부터">⏮</button>
      <button class="ls-btn main" id="ls-play" title="재생">▶</button>
    </div>
    <div class="ls-msg" id="ls-msg"></div>
    <div class="ls-note">끝까지 들으면 자동으로 기록돼요. 앞으로 넘기기는 없어요!</div>
  </div>

  <!-- S-03 녹음·제출 -->
  <div id="screen-record" class="hidden">
    <button class="back-btn" id="rc-back">&larr; 오늘의 숙제로</button>
    <div class="ls-head">
      <div class="ls-subject" id="rc-subject"></div>
      <div class="ls-title" id="rc-title"></div>
      <div class="ls-count" id="rc-due"></div>
    </div>

    <!-- 읽을 본문 (있을 때만) -->
    <div class="ls-transcript hidden" id="rc-transcript"></div>

    <!-- 녹음 전/중/미리듣기 -->
    <div class="rc-stage" id="rc-stage">
      <div class="rc-state-label" id="rc-state-label">녹음 버튼을 누르고 또박또박 읽어주세요</div>
      <div class="rc-timer" id="rc-timer">0:00</div>
      <button class="rc-main-btn rec" id="rc-main">🎤 녹음 시작</button>
      <audio class="rc-preview hidden" id="rc-preview" controls></audio>
      <div><button class="rc-sub-btn hidden" id="rc-again">다시 녹음하기</button></div>
    </div>

    <!-- 제출 완료 -->
    <div class="rc-stage rc-result hidden" id="rc-done">
      <div class="big">🎉</div>
      <div class="title">제출 완료!</div>
      <div class="sub" id="rc-done-info"></div>
      <div class="awards rc-awards hidden" id="rc-awards-box">
        <div class="aw-title">받은 포인트</div>
        <div id="rc-awards-list"></div>
      </div>
      <button class="rc-main-btn submit" id="rc-done-back">오늘의 숙제로</button>
    </div>
    <div class="ls-msg" id="rc-msg"></div>
  </div>

  <!-- 거울 모드: 듣기·녹음 시 자동으로 켜지는, 저장하지 않는 카메라 프리뷰 (5.4) -->
  <div id="mirror-preview" class="mirror-preview hidden">
    <span class="mirror-badge">🪞 거울</span>

// ===== 설정 =====

var API_URL = 'https://script.google.com/macros/s/AKfycbw7YF-4dqomyexzQFUM3HiVLwZWUhNBBNcu2O-DqS1HXvpnTZ1mG2FglILSIoDGDmpY1g/exec';

var Server = (function () {
  var useMock = location.protocol === 'file:' || /[?&]mock=1/.test(location.search);
  if (!useMock) {
    var payloadOf = {
      getLoginBootstrap: function () { return {}; },
      loginStudent: function (a) { return { studentId: a[0], pin: a[1] }; },
      loginTeacher: function (a) { return { pin: a[0] }; },

      call: function (fn, args, onOk, onErr) {

          method: 'POST',
          // text/plain: CORS preflight를 만들지 않는 안전한 타입 (설계결정문서 5.13)
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },

    getTodayDashboard: function () {

          { item_id: 'AI-1', subject: '기사', label: 'Article 2 · 본문 녹음', seq: '', action_type: 'record', status: '재제출요청', due_date: '2026-07-17', due_time: '21:00', overdue: true },
          { item_id: 'AI-2', subject: '기사', label: 'Article 3 · 단어 듣기', seq: '', action_type: 'listen', status: '미시작', due_date: '2026-07-18', due_time: '21:00', overdue: false },
          { item_id: 'AI-3', subject: 'Voca', label: 'Voca 07 암송', seq: '1/3', action_type: 'record', status: '진행중', due_date: '2026-07-18', due_time: '21:00', overdue: false },
          { item_id: 'AI-4', subject: 'QnA', label: 'Q&A 서술형 답안', seq: '', action_type: 'write', status: '미시작', due_date: '2026-07-18', due_time: '21:00', overdue: false },
          { item_id: 'AI-5', subject: '리스닝', label: 'Unit 2 · p.14 듣기', seq: '', action_type: 'listen', status: '제출완료', due_date: '2026-07-18', due_time: '21:00', overdue: false }
        ],
        progress: { done: 1, total: 5 },
        points: { total: 275, todayAwards: [
          { label: '기본 제출 +10', amount: 10 }, { label: '정시 제출 +5', amount: 5 }, { label: 'A반 2등 제출 +5', amount: 5 }
        ] },
        tier: { current: 'Starter', next: 'Builder', progress: 275 / 300, need: 25 },
        streak: 5 };
    },
    _mockValid: 0,
    _silentWav: function (sec) {
      var rate = 8000, n = Math.floor(rate * sec);
      var buf = new ArrayBuffer(44 + n), v = new DataView(buf);
      var ws = function (o, s) { for (var i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
      ws(0, 'RIFF'); v.setUint32(4, 36 + n, true); ws(8, 'WAVEfmt '); v.setUint32(16, 16, true);
      v.setUint16(20, 1, true); v.setUint16(22, 1, true); v.setUint32(24, rate, true); v.setUint32(28, rate, true);
      v.setUint16(32, 1, true); v.setUint16(34, 8, true); ws(36, 'data'); v.setUint32(40, n, true);

// ===== 거울 모드 (설계결정문서 5.4) — 독립 모듈 =====
// 듣기·녹음 화면에 들어가면 자동으로 켜지고, 화면을 떠나면 즉시 완전히 꺼진다.
// 동의를 묻지 않는다(학생이 스스로 켤 이유가 없으므로). 저장하지 않으며 "저장 안 됨"을 프리뷰에 상시 표시.
// 카메라를 못 켜거나 거부해도 학습에는 지장이 없으므로 조용히 넘어간다.
var Mirror = (function () {
  var stream = null;
  var wanted = false; // 지금 학습화면에 있어 켜져 있어야 하는가 (getUserMedia 비동기 경쟁 방지용)
  function $(id) { return document.getElementById(id); }

  // 듣기/녹음 화면 진입 → 자동 켜기
  function enter() {
    wanted = true;
    if (!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia)) return;
    if (stream) { showPreview(); return; }
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false })
      .then(function (s) {
        // 스트림이 준비되기 전에 화면을 떠났으면 바로 정리 (카메라가 켜진 채 남지 않도록)
        if (!wanted) { s.getTracks().forEach(function (t) { t.stop(); }); return; }
        stream = s;
        $('mirror-video').srcObject = s;
        showPreview();
      })
      .catch(function () { /* 카메라 거부/불가 — 무시 */ });
  }
  function showPreview() { if (stream) $('mirror-preview').classList.remove('hidden'); }
  // 학습화면 이탈·로그아웃 → 카메라 완전 종료 (프리뷰만 숨기는 게 아니라 스트림을 끈다)
  function stop() {
    wanted = false;
    if (stream) { stream.getTracks().forEach(function (t) { t.stop(); }); stream = null; }
    var v = $('mirror-video'); if (v) v.srcObject = null;
    $('mirror-preview').classList.add('hidden');
  }
  return { enter: enter, stop: stop };
})();

var App = (function () {
  var SESSION_KEY = 'cambridge_session';
  var bootstrap = null;
  var selGroup = null, selStudent = null;
  var pinBuffer = '', pinMode = 'student'; // 'student' | 'teacher'

  function $(id) { return document.getElementById(id); }
  function show(id) {
    ['screen-loading','screen-group','screen-name','screen-pin','screen-home','screen-dash','screen-listen','screen-record'].forEach(function (s) {

    });
    // 로그인 이후 화면에서는 상단 브랜드를 숨겨 공간 확보
    var loginScreens = ['screen-loading', 'screen-group', 'screen-name', 'screen-pin'];
    document.querySelector('.brand').classList.toggle('hidden', loginScreens.indexOf(id) === -1);
    // 거울 모드: 듣기·녹음 화면에서 자동 켜기, 그 외 화면에서는 완전 끄기
    if (id === 'screen-listen' || id === 'screen-record') Mirror.enter();
    else Mirror.stop();
  }
  function saveSession(s) { localStorage.setItem(SESSION_KEY, JSON.stringify(s)); }
  function loadSession() {
    try { return JSON.parse(localStorage.getItem(SESSION_KEY)); } catch (e) { return null; }
  }

  function init() {
    var sess = loadSession();
    if (sess && sess.token) {
      Server.call('verifySession', [sess.token], function (res) {
        if (res.ok) { showHome(sess); } else { localStorage.removeItem(SESSION_KEY); loadBootstrap(); }
      }, function () {
        // 오프라인 등으로 검증 실패 시: 저장된 세션으로 일단 진입 (다음 온라인 요청에서 재검증)
        showHome(sess);
      });

    }

  function loadBootstrap() {
    show('screen-loading');
    Server.call('getLoginBootstrap', [], function (res) {
      bootstrap = res;
      renderGroups();
    });
  }

  function renderGroups() {
    var grid = $('group-grid');
    grid.innerHTML = '';
    bootstrap.groups.forEach(function (g) {
      var b = document.createElement('button');

      b.textContent = g.group_name;

      grid.appendChild(b);
    });

  }

  function renderNames() {
    $('name-title').textContent = selGroup.group_name + ' — 이름을 골라주세요';

    grid.innerHTML = '';
    (bootstrap.studentsByGroup[selGroup.group_id] || []).forEach(function (s) {
      var b = document.createElement('button');
      b.className = 'choice-btn';
      b.textContent = s.name;
      b.onclick = function () { selStudent = s; showPin('student'); };
      grid.appendChild(b);
    });
    show('screen-name');
  }

  function showPin(mode) {
    pinMode = mode;
    pinBuffer = '';
    updateDots();
    $('pin-msg').textContent = '';
    if (mode === 'student') {
      $('pin-title').textContent = selStudent.name + ' — 비밀번호 4자리를 눌러주세요';
      $('pin-back').onclick = function () { renderNames(); };
    } else {
      $('pin-title').textContent = '관리자 PIN을 입력하세요';
      $('pin-back').onclick = function () { renderGroups(); };
    }
    renderPad();
    show('screen-pin');
  }

  function renderPad() {
    var pad = $('pin-pad');
    pad.innerHTML = '';
    ['1','2','3','4','5','6','7','8','9','지우기','0','전체삭제'].forEach(function (k) {
      var b = document.createElement('button');
      b.className = 'pin-key' + (isNaN(k) ? ' fn' : '');
      b.textContent = k;
      b.onclick = function () { onKey(k); };
      pad.appendChild(b);
    });
  }

  function updateDots() {
    var dots = document.querySelectorAll('.pin-dot');
    for (var i = 0; i < 4; i++) dots[i].classList.toggle('filled', i < pinBuffer.length);
  }

  function onKey(k) {
    if (k === '지우기') pinBuffer = pinBuffer.slice(0, -1);
    else if (k === '전체삭제') pinBuffer = '';

    if (pinBuffer.length === 4) submitPin();
  }

  function submitPin() {
    $('pin-msg').textContent = '확인 중...';

  function renderDashboard(sess, d) {
    var dt = new Date(d.today + 'T00:00:00');

    $('rc-again').classList.toggle('hidden', state !== 'preview');
    $('rc-stage').classList.toggle('hidden', state === 'done');
    $('rc-done').classList.toggle('hidden', state !== 'done');
    if (state === 'idle') {
      main.className = 'rc-main-btn rec';
      main.textContent = '🎤 녹음 시작';
      main.disabled = false;
      label.textContent = '녹음 버튼을 누르고 또박또박 읽어주세요';
      $('rc-timer').textContent = '0:00';
    } else if (state === 'recording') {
      main.className = 'rc-main-btn stop';
      main.textContent = '⏹ 녹음 끝내기';
      main.disabled = false;
      label.innerHTML = '<span class="rc-dot"></span>녹음 중...';
    } else if (state === 'preview') {
      main.className = 'rc-main-btn submit';
      main.textContent = '📤 선생님께 제출하기';
      main.disabled = false;
      label.textContent = '들어보고 마음에 들면 제출해요';
    } else if (state === 'uploading') {
      main.className = 'rc-main-btn submit';
      main.textContent = '보내는 중...';
      main.disabled = true;
      label.textContent = '조금만 기다려주세요';
    }
  }

  function rcStartTimer() {
    var t0 = Date.now();
    Rec.timer = setInterval(function () {
      $('rc-timer').textContent = fmtTime((Date.now() - t0) / 1000);
    }, 250);
  }
  function rcStopTimer() { if (Rec.timer) { clearInterval(Rec.timer); Rec.timer = null; } }

  function openRecord(c) {
    Rec.item = c;
    Rec.blob = null;
    $('rc-subject').textContent = c.subject + ' · ' + (ACTION_META[c.action_type] || ACTION_META.record).label;
    $('rc-title').textContent = c.label + (c.seq ? ' (' + c.seq + ')' : '');
    $('rc-due').textContent = '마감 ' + (c.due_time || '21:00') + (c.overdue ? ' · 마감 지남' : '');
    $('rc-msg').textContent = '';
    $('rc-msg').className = 'ls-msg';
    $('rc-awards-box').classList.add('hidden');
    rcSetState('idle');
    show('screen-record');

    // 읽을 본문 표시 — 학생이 보면서 읽도록 (getListenData 재사용, 음원은 안 가져옴)
    var tr = $('rc-transcript');
    tr.classList.add('hidden');
    Server.call('getListenData', [loadSession().token, c.item_id], function (res) {
      if (res.ok && res.transcript && Rec.item && Rec.item.item_id === c.item_id) {
        tr.textContent = res.transcript;
        tr.classList.remove('hidden');
      }
    }, function () { /* 본문 표시는 부가 기능 — 실패해도 녹음은 진행 */ });

    $('rc-back').onclick = function () {
      if (Rec.state === 'recording') {
        if (!confirm('녹음 중이에요. 나가면 지금 녹음은 사라져요. 나갈까요?')) return;
        Recorder.cancel();
        rcStopTimer();
      }
      loadDashboard(loadSession());
    };
    $('rc-done-back').onclick = function () { loadDashboard(loadSession()); };
    $('rc-again').onclick = function () {
      Rec.blob = null;
      $('rc-preview').src = '';
      rcSetState('idle');
    };
    $('rc-main').onclick = rcMainAction;
  }

  function rcMainAction() {
    if (Rec.state === 'idle') {
      if (!window.Recorder || !Recorder.isSupported()) {
        $('rc-msg').textContent = '이 브라우저는 녹음을 지원하지 않아요. 크롬이나 사파리로 열어주세요.';
        $('rc-msg').className = 'ls-msg bad';
        return;
      }
      Recorder.start().then(function () {
        rcSetState('recording');
        rcStartTimer();
      }).catch(function () {
        $('rc-msg').textContent = '마이크를 사용할 수 없어요. 마이크 권한을 허용해주세요.';
        $('rc-msg').className = 'ls-msg bad';
      });
    } else if (Rec.state === 'recording') {
      rcStopTimer();
      Recorder.stop().then(function (r) {
        Rec.blob = r.blob;
        Rec.mimeType = r.mimeType;
        $('rc-preview').src = URL.createObjectURL(r.blob);
        rcSetState('preview');
      }).catch(function () {
        $('rc-msg').textContent = '녹음 저장에 실패했어요. 다시 해보세요.';
        $('rc-msg').className = 'ls-msg bad';
        rcSetState('idle');
      });
    } else if (Rec.state === 'preview') {
      rcSubmit();
    }
  }

  function rcSubmit() {
    if (!Rec.blob) return;
    rcSetState('uploading');
    var sess = loadSession();
    Recorder.blobToBase64(Rec.blob).then(function (b64) {
      Server.call('submitRecording', [sess.token, Rec.item.item_id, b64, Rec.mimeType], function (res) {
        if (!res.ok) {
          if (res.needLogin) { localStorage.removeItem(SESSION_KEY); loadBootstrap(); return; }
          $('rc-msg').textContent = res.message || '제출에 실패했어요. 다시 해보세요.';
          $('rc-msg').className = 'ls-msg bad';
          rcSetState('preview');
          return;
        }
        $('rc-done-info').textContent = res.attempt_no + '회차 제출 · ' + res.submitted_at
          + (res.flag ? ' · 확인 필요 표시됨' : '');
        var box = $('rc-awards-box');
        if (res.awards && res.awards.length) {
          box.classList.remove('hidden');
          var list = $('rc-awards-list');
          list.innerHTML = '';
          res.awards.forEach(function (a) {
            var row = document.createElement('div');
            row.className = 'aw-row';
            var name = document.createElement('span');
            name.textContent = String(a.label).replace(/\s*\+\d+\s*P?\s*$/, '');
            var amt = document.createElement('b');
            amt.textContent = '+' + a.amount + 'P';
            row.appendChild(name); row.appendChild(amt);
            list.appendChild(row);
          });
        } else {
          box.classList.add('hidden');
        }
        rcSetState('done');
      }, function () {
        $('rc-msg').textContent = '연결이 불안정해요. 인터넷을 확인하고 다시 제출해주세요.';
        $('rc-msg').className = 'ls-msg bad';
        rcSetState('preview');
      });
    });
  }

  // ===== S-02 듣기 학습 =====
  var Listen = { audio: null, itemId: null, sessionStart: null, maxReached: 0, skipped: false, playing: false, finished: false };

  function fmtTime(sec) {
    if (!isFinite(sec) || sec < 0) return '-:--';
    var m = Math.floor(sec / 60), s = Math.floor(sec % 60);
    return m + ':' + (s < 10 ? '0' : '') + s;
  }

  function openListen(c) {
    show('screen-loading');
    var sess = loadSession();
    Server.call('getListenData', [sess.token, c.item_id], function (res) {
      if (!res.ok) {
        if (res.needLogin) { localStorage.removeItem(SESSION_KEY); loadBootstrap(); return; }
        alert(res.message || '불러오지 못했어요.');
        loadDashboard(sess);
        return;
      }
      setupListen(res);
    });
  }

  function setupListen(d) {
    Listen.itemId = d.item_id;
    Listen.sessionStart = null;
    Listen.maxReached = 0;
    Listen.skipped = false;
    Listen.playing = false;
    Listen.finished = false;

    $('ls-subject').textContent = d.subject;
    $('ls-title').textContent = d.label;
    $('ls-count').textContent = d.valid_count;
    $('ls-required').textContent = d.required;
    var tr = $('ls-transcript');
    if (d.transcript) { tr.textContent = d.transcript; tr.classList.remove('empty'); }
    else { tr.textContent = '🎵 음원을 들으며 따라 읽어보세요'; tr.classList.add('empty'); }
    $('ls-msg').textContent = '';
    $('ls-msg').className = 'ls-msg';
    $('ls-fill').style.width = '0%';
    $('ls-cur').textContent = '0:00';
    $('ls-dur').textContent = '-:--';
    $('ls-play').textContent = '▶';
    $('ls-play').disabled = false;

    if (Listen.audio) { Listen.audio.pause(); Listen.audio.src = ''; }
    var audio = new Audio();
    audio.preload = 'metadata';
    Listen.audio = audio;

    // 음원 로드: mock은 audio_url(blob), 실서버는 GAS 프록시(base64→blob)
    // 드라이브 직링크는 <audio>에서 재생이 막혀 프록시 방식 사용 (2026-07-19)
    if (d.audio_url) {
      audio.src = d.audio_url;
    } else if (d.has_audio) {
      $('ls-msg').textContent = '음원 불러오는 중...';
      $('ls-msg').className = 'ls-msg';
      $('ls-play').disabled = true;
      var sess0 = loadSession();
      Server.call('getAudioForUnit', [sess0.token, d.content_unit_id], function (res) {
        if (!res.ok) {
          $('ls-msg').textContent = res.message || '음원을 불러올 수 없어요. 선생님께 알려주세요.';
          $('ls-msg').className = 'ls-msg bad';
          return;
        }
        var bin = atob(res.base64);
        var u8 = new Uint8Array(bin.length);
        for (var i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
        audio.src = URL.createObjectURL(new Blob([u8], { type: res.mimeType || 'audio/mpeg' }));
        $('ls-msg').textContent = '';
        $('ls-play').disabled = false;
      }, function () {
        $('ls-msg').textContent = '연결이 불안정해요. 뒤로 갔다가 다시 들어와주세요.';
        $('ls-msg').className = 'ls-msg bad';
      });
    } else {
      $('ls-msg').textContent = '음원이 아직 등록되지 않았어요. 선생님께 알려주세요.';
      $('ls-msg').className = 'ls-msg bad';
      $('ls-play').disabled = true;
    }

    // OS 미디어 컨트롤의 탐색 버튼 미등록 (설계결정문서 5.3 — MediaSession seek 핸들러 등록 안 함)
    if ('mediaSession' in navigator) {
      ['seekbackward', 'seekforward', 'seekto'].forEach(function (a) {
        try { navigator.mediaSession.setActionHandler(a, null); } catch (e) {}
      });
    }

    audio.addEventListener('loadedmetadata', function () { $('ls-dur').textContent = fmtTime(audio.duration); });
    audio.addEventListener('timeupdate', function () {
      if (audio.currentTime > Listen.maxReached) Listen.maxReached = audio.currentTime;
      if (audio.duration) $('ls-fill').style.width = Math.min(100, audio.currentTime / audio.duration * 100) + '%';
      $('ls-cur').textContent = fmtTime(audio.currentTime);
    });
    // UI 차단을 우회한 앞으로 건너뛰기 감지 (2차 안전장치). 되감기는 허용
    audio.addEventListener('seeking', function () {
      if (audio.currentTime > Listen.maxReached + 1.0) Listen.skipped = true;
    });
    audio.addEventListener('ended', function () { onListenEnded(); });
    audio.addEventListener('error', function () {
      $('ls-msg').textContent = '음원을 불러올 수 없어요. 선생님께 알려주세요.';
      $('ls-msg').className = 'ls-msg bad';
      $('ls-play').disabled = true;
    });

    $('ls-play').onclick = function () {
      if (Listen.playing) {
        audio.pause();
        Listen.playing = false;
        $('ls-play').textContent = '▶';
      } else {
        if (!Listen.sessionStart) Listen.sessionStart = new Date();
        audio.play();
        Listen.playing = true;
        $('ls-play').textContent = '⏸';
        $('ls-msg').textContent = '';
        $('ls-msg').className = 'ls-msg';
      }
    };
    $('ls-restart').onclick = function () {
      // 처음부터 = 새 세션 시작 (되감기 허용, 이전 진행은 기록하지 않음)
      audio.currentTime = 0;
      Listen.maxReached = 0;
      Listen.skipped = false;
      Listen.sessionStart = new Date();
      if (!Listen.playing) { audio.play(); Listen.playing = true; $('ls-play').textContent = '⏸'; }
    };
    show('screen-listen');
  }

  function pad2(n) { return (n < 10 ? '0' : '') + n; }
  function tsStr(d) {
    return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate()) + ' ' +
      pad2(d.getHours()) + ':' + pad2(d.getMinutes()) + ':' + pad2(d.getSeconds());
  }

  function onListenEnded() {
    Listen.playing = false;
    Listen.finished = true;
    $('ls-play').textContent = '▶';
    $('ls-msg').textContent = '기록 중...';
    var sess = loadSession();
    var started = Listen.sessionStart ? tsStr(Listen.sessionStart) : tsStr(new Date());
    Server.call('recordListenSession', [sess.token, Listen.itemId, started, true, Listen.skipped], function (res) {
      if (!res.ok) {
        $('ls-msg').textContent = res.message || '기록에 실패했어요. 한 번 더 들어주세요.';
        $('ls-msg').className = 'ls-msg bad';
        return;
      }
      $('ls-count').textContent = res.valid_count;
      $('ls-required').textContent = res.required;
      if (res.just_completed) {
        var earned = (res.awards || []).reduce(function (sum, a) { return sum + a.amount; }, 0);
        $('ls-msg').textContent = '🎉 유효 듣기 달성!' + (earned ? ' +' + earned + 'P' : '') + ' 오늘의 숙제로 돌아가요';
        $('ls-msg').className = 'ls-msg good';
        setTimeout(function () { loadDashboard(sess); }, 1800);
      } else if (Listen.skipped) {
        $('ls-msg').textContent = '건너뛰기가 감지돼 이번 회차는 인정되지 않았어요. 처음부터 다시!';
        $('ls-msg').className = 'ls-msg bad';
        Listen.skipped = false;
        Listen.maxReached = 0;
        Listen.sessionStart = null;
      } else {
        $('ls-msg').textContent = '✅ 유효 듣기 1회 완료! (' + res.valid_count + '/' + res.required + ')';
        $('ls-msg').className = 'ls-msg good';
        Listen.sessionStart = null;
        Listen.maxReached = 0;
      }
    });
  }

  function closeListen() {
    if (Listen.playing && !Listen.finished) {
      if (!confirm('아직 다 듣지 않았어요. 지금 나가면 이번 듣기는 인정되지 않아요. 나갈까요?')) return;
    }
    if (Listen.audio) { Listen.audio.pause(); }
    loadDashboard(loadSession());
  }

  function logout() {
    localStorage.removeItem(SESSION_KEY);
    selGroup = selStudent = null;
    Mirror.stop();
    if (bootstrap) renderGroups(); else loadBootstrap();
  }

  return {
    init: init,
    showGroups: renderGroups,
    showTeacherLogin: function () { showPin('teacher'); },
    closeListen: closeListen,
    logout: logout
  };
})();

App.init();

// ===== 서비스워커 등록 (PWA 설치·오프라인 셸) =====
if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  navigator.serviceWorker.register('sw.js');
}
</script>
