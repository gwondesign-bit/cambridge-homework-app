<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>캠브리지 영어 숙제</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#4361ee">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="영어숙제">
<style>
  :root {
    --primary: #4361ee;
    --primary-dark: #3a4fd0;
    --bg: #f4f6fb;
    --card: #ffffff;
    --text: #1b2340;
    --muted: #7a829e;
    --danger: #e5484d;
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; justify-content: center;
    padding-top: env(safe-area-inset-top);
  }
  #app { width: 100%; max-width: 430px; min-height: 100%; padding: 24px 20px; display: flex; flex-direction: column; }

  .brand { text-align: center; margin: 24px 0 8px; }
  .brand h1 { font-size: 22px; }
  .brand p { color: var(--muted); font-size: 13px; margin-top: 6px; }

  .step-title { font-size: 17px; font-weight: bold; margin: 24px 0 12px; }
  .back-btn { background: none; border: none; color: var(--muted); font-size: 14px; padding: 8px 0; cursor: pointer; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .choice-btn {
    background: var(--card); border: 2px solid transparent; border-radius: var(--radius);
    padding: 20px 12px; font-size: 17px; font-weight: bold; color: var(--text);
    box-shadow: 0 2px 8px rgba(27,35,64,.06); cursor: pointer; transition: transform .06s;
  }
  .choice-btn:active { transform: scale(.97); border-color: var(--primary); }

  /* PIN */
  .pin-dots { display: flex; justify-content: center; gap: 16px; margin: 20px 0 8px; }
  .pin-dot { width: 16px; height: 16px; border-radius: 50%; background: #d9deec; }
  .pin-dot.filled { background: var(--primary); }
  .pin-msg { text-align: center; min-height: 20px; font-size: 14px; color: var(--danger); margin-bottom: 8px; }
  .pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 8px; }
  .pin-key {
    background: var(--card); border: none; border-radius: var(--radius);
    padding: 18px 0; font-size: 22px; font-weight: bold; color: var(--text);
    box-shadow: 0 2px 6px rgba(27,35,64,.06); cursor: pointer;
  }
  .pin-key:active { background: #e8ecfa; }
  .pin-key.fn { font-size: 15px; color: var(--muted); background: transparent; box-shadow: none; }

  .teacher-link { margin-top: auto; padding-top: 28px; text-align: center; }
  .teacher-link button { background: none; border: none; color: var(--muted); font-size: 13px; text-decoration: underline; cursor: pointer; }

  /* 로그인 후 자리표시 화면 */
  .home-card { background: var(--card); border-radius: var(--radius); padding: 28px 20px; text-align: center; box-shadow: 0 2px 8px rgba(27,35,64,.06); margin-top: 32px; }
  .home-card .hello { font-size: 20px; font-weight: bold; margin-bottom: 8px; }
  .home-card .note { color: var(--muted); font-size: 13px; line-height: 1.6; }
  .logout-btn { margin-top: 20px; background: var(--primary); color: #fff; border: none; border-radius: 12px; padding: 12px 24px; font-size: 15px; font-weight: bold; cursor: pointer; }

  .loading { text-align: center; color: var(--muted); padding: 48px 0; }
  .hidden { display: none; }
  .offline-note { text-align: center; color: var(--muted); font-size: 12px; padding: 8px 0; }

  /* ===== S-01 오늘의 숙제 ===== */
  .dash-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .dash-date { font-size: 14px; color: var(--muted); }
  .dash-name { font-size: 18px; font-weight: bold; }
  .dash-logout { background: none; border: none; color: var(--muted); font-size: 12px; text-decoration: underline; cursor: pointer; }
  .chips { display: flex; gap: 8px; margin: 10px 0 4px; }
  .chip { background: var(--card); border-radius: 999px; padding: 6px 12px; font-size: 13px; font-weight: bold; box-shadow: 0 1px 4px rgba(27,35,64,.06); }
  .chip.point { color: #b8860b; }
  .chip.streak { color: #e05d38; }
  .tier-box { background: var(--card); border-radius: 12px; padding: 10px 14px; margin: 10px 0; box-shadow: 0 1px 4px rgba(27,35,64,.06); }
  .tier-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .tier-row b { color: var(--text); }
  .tier-bar { height: 8px; border-radius: 4px; background: #e3e7f5; overflow: hidden; }
  .tier-bar > div { height: 100%; background: linear-gradient(90deg, var(--primary), #7b96ff); border-radius: 4px; }
  .awards { background: #fffbe8; border: 1px solid #f3e3a0; border-radius: 12px; padding: 10px 14px; margin: 8px 0; }
  .awards .aw-title { font-size: 12px; color: #9a7b00; font-weight: bold; margin-bottom: 4px; }
  .awards .aw-row { display: flex; justify-content: space-between; font-size: 13px; padding: 2px 0; }
  .awards .aw-row b { color: #b8860b; }
  .today-progress { margin: 14px 0 6px; }
  .today-progress .tp-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
  .tp-bar { height: 10px; border-radius: 5px; background: #e3e7f5; overflow: hidden; }
  .tp-bar > div { height: 100%; background: #34c77b; border-radius: 5px; transition: width .3s; }
  .cards { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; padding-bottom: 24px; }
  .hw-card { background: var(--card); border-radius: 14px; padding: 14px; display: flex; align-items: center; gap: 12px;
    box-shadow: 0 2px 8px rgba(27,35,64,.06); border-left: 5px solid transparent; cursor: pointer; }
  .hw-card:active { transform: scale(.985); }
  .hw-card.st-redo { border-left-color: var(--danger); }
  .hw-card.st-todo { border-left-color: var(--primary); }
  .hw-card.st-doing { border-left-color: #eab308; }
  .hw-card.st-done { border-left-color: #34c77b; opacity: .62; }
  .hw-icon { font-size: 22px; width: 34px; text-align: center; flex-shrink: 0; }
  .hw-main { flex: 1; min-width: 0; }
  .hw-subject { font-size: 11px; font-weight: bold; color: var(--primary); }
  .hw-label { font-size: 15px; font-weight: bold; margin: 1px 0; }
  .hw-meta { font-size: 12px; color: var(--muted); }
  .hw-meta .overdue { color: var(--danger); font-weight: bold; }
  .hw-status { font-size: 12px; font-weight: bold; flex-shrink: 0; }
  .st-redo .hw-status { color: var(--danger); }
  .st-todo .hw-status { color: var(--primary); }
  .st-doing .hw-status { color: #b8860b; }
  .st-done .hw-status { color: #189a58; }
  .empty-note { text-align: center; color: var(--muted); font-size: 14px; padding: 40px 0; line-height: 1.7; }

  /* ===== S-02 듣기 학습 ===== */
  .ls-head { margin-bottom: 8px; }
  .ls-subject { font-size: 12px; font-weight: bold; color: var(--primary); }
  .ls-title { font-size: 19px; font-weight: bold; margin-top: 2px; }
  .ls-count { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .ls-count b { color: var(--primary); }
  .ls-transcript {
    background: var(--card); border-radius: 14px; padding: 16px; margin: 12px 0;
    font-size: 15px; line-height: 1.9; max-height: 42vh; overflow-y: auto;
    box-shadow: 0 2px 8px rgba(27,35,64,.06); white-space: pre-wrap;
  }
  .ls-transcript.empty { color: var(--muted); text-align: center; font-size: 14px; }
  .ls-progress { margin: 14px 0 4px; }
  .ls-bar { height: 10px; border-radius: 5px; background: #e3e7f5; overflow: hidden; }
  .ls-bar > div { height: 100%; background: var(--primary); border-radius: 5px; }
  .ls-time { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-top: 4px; }
  .ls-controls { display: flex; justify-content: center; gap: 14px; margin: 16px 0; }
  .ls-btn {
    border: none; border-radius: 50%; width: 62px; height: 62px; font-size: 24px;
    background: var(--card); color: var(--text); box-shadow: 0 2px 8px rgba(27,35,64,.1); cursor: pointer;
  }
  .ls-btn.main { width: 78px; height: 78px; font-size: 30px; background: var(--primary); color: #fff; }
  .ls-btn:active { transform: scale(.95); }
  .ls-btn:disabled { opacity: .4; }
  .ls-msg { text-align: center; min-height: 22px; font-size: 14px; font-weight: bold; }
  .ls-msg.good { color: #189a58; }
  .ls-msg.bad { color: var(--danger); }
  .ls-note { text-align: center; font-size: 11px; color: var(--muted); margin-top: 6px; }
</style>
</head>
<body>
<div id="app">
  <div class="brand">
    <h1>캠브리지 영어 숙제</h1>
    <p id="brand-sub">오늘도 반가워요!</p>
  </div>

  <div id="screen-loading" class="loading">불러오는 중...</div>

  <!-- 1단계: 반 선택 -->
  <div id="screen-group" class="hidden">
    <div class="step-title">우리 반을 골라주세요</div>
    <div id="group-grid" class="grid"></div>
    <div class="teacher-link"><button onclick="App.showTeacherLogin()">선생님 로그인</button></div>
  </div>

  <!-- 2단계: 이름 선택 -->
  <div id="screen-name" class="hidden">
    <button class="back-btn" onclick="App.showGroups()">&larr; 반 다시 고르기</button>
    <div class="step-title" id="name-title">이름을 골라주세요</div>
    <div id="name-grid" class="grid"></div>
  </div>

  <!-- 3단계: PIN 입력 (학생/선생님 공용) -->
  <div id="screen-pin" class="hidden">
    <button class="back-btn" id="pin-back">&larr; 뒤로</button>
    <div class="step-title" id="pin-title">비밀번호 4자리를 눌러주세요</div>
    <div class="pin-dots">
      <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    <div class="pin-msg" id="pin-msg"></div>
    <div class="pin-pad" id="pin-pad"></div>
  </div>

  <!-- 선생님 자리표시 (4.1 현황판에서 교체) -->
  <div id="screen-home" class="hidden">
    <div class="home-card">
      <div class="hello" id="home-hello"></div>
      <div class="note" id="home-note"></div>
      <button class="logout-btn" onclick="App.logout()">로그아웃</button>
    </div>
  </div>

  <!-- S-01 오늘의 숙제 (학생 대시보드) -->
  <div id="screen-dash" class="hidden">
    <div class="dash-head">
      <div>
        <div class="dash-date" id="dash-date"></div>
        <div class="dash-name" id="dash-name"></div>
      </div>
      <button class="dash-logout" onclick="App.logout()">로그아웃</button>
    </div>
    <div class="chips">
      <div class="chip point" id="chip-point">⭐ 0P</div>
      <div class="chip streak" id="chip-streak">🔥 0일</div>
    </div>
    <div class="tier-box" id="tier-box">
      <div class="tier-row"><span>내 등급 <b id="tier-cur">Starter</b></span><span id="tier-need"></span></div>
      <div class="tier-bar"><div id="tier-fill" style="width:0%"></div></div>
    </div>
    <div class="awards hidden" id="awards-box">
      <div class="aw-title">오늘 받은 포인트</div>
      <div id="awards-list"></div>
    </div>
    <div class="today-progress">
      <div class="tp-label"><b>오늘의 숙제</b><span id="tp-count">0/0 완료</span></div>
      <div class="tp-bar"><div id="tp-fill" style="width:0%"></div></div>
    </div>
    <div class="cards" id="hw-cards"></div>
  </div>

  <!-- S-02 듣기 학습 -->
  <div id="screen-listen" class="hidden">
    <button class="back-btn" onclick="App.closeListen()">&larr; 오늘의 숙제로</button>
    <div class="ls-head">
      <div class="ls-subject" id="ls-subject"></div>
      <div class="ls-title" id="ls-title"></div>
      <div class="ls-count">🎧 유효 듣기 <b id="ls-count">0</b>/<span id="ls-required">1</span>회</div>
    </div>
    <div class="ls-transcript" id="ls-transcript"></div>
    <div class="ls-progress">
      <div class="ls-bar"><div id="ls-fill" style="width:0%"></div></div>
      <div class="ls-time"><span id="ls-cur">0:00</span><span id="ls-dur">-:--</span></div>
    </div>
    <div class="ls-controls">
      <button class="ls-btn" id="ls-restart" title="처음부터">⏮</button>
      <button class="ls-btn main" id="ls-play" title="재생">▶</button>
    </div>
    <div class="ls-msg" id="ls-msg"></div>
    <div class="ls-note">끝까지 들으면 자동으로 기록돼요. 앞으로 넘기기는 없어요!</div>
  </div>
</div>

<script>
// ===== 설정 =====
// GAS 웹앱(Api.gs) 배포 URL. 재배포 시 "기존 배포 수정 → 새 버전"을 쓰면 이 URL은 바뀌지 않는다.
var API_URL = 'https://script.google.com/macros/s/AKfycbw7YF-4dqomyexzQFUM3HiVLwZWUhNBBNcu2O-DqS1HXvpnTZ1mG2FglILSIoDGDmpY1g/exec';

// ===== 서버 호출 래퍼 =====
// file:// 로 직접 열면(개발 미리보기) mock, 그 외에는 GAS JSON API를 fetch로 호출
var Server = (function () {
  var useMock = location.protocol === 'file:' || /[?&]mock=1/.test(location.search);
  if (!useMock) {
    var payloadOf = {
      getLoginBootstrap: function () { return {}; },
      loginStudent: function (a) { return { studentId: a[0], pin: a[1] }; },
      loginTeacher: function (a) { return { pin: a[0] }; },
      verifySession: function (a) { return { token: a[0] }; },
      getTodayDashboard: function (a) { return { token: a[0] }; },
      getListenData: function (a) { return { token: a[0], itemId: a[1] }; },
      recordListenSession: function (a) { return { token: a[0], itemId: a[1], startedAt: a[2], completed: a[3], skipped: a[4] }; }
    };
    return {
      call: function (fn, args, onOk, onErr) {
        var body = Object.assign({ action: fn }, payloadOf[fn](args || []));
        fetch(API_URL, {
          method: 'POST',
          // text/plain: CORS preflight를 만들지 않는 안전한 타입 (설계결정문서 5.13)
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(body)
        })
          .then(function (r) { return r.json(); })
          .then(onOk)
          .catch(onErr || function () {
            alert('연결에 문제가 있어요. 인터넷을 확인하고 다시 해보세요.');
          });
      }
    };
  }
  // ---- 로컬 미리보기용 mock ----
  var MOCK = {
    getLoginBootstrap: function () {
      return { ok: true,
        groups: [ { group_id: 'G-A', group_name: 'A반' }, { group_id: 'G-B', group_name: 'B반' } ],
        studentsByGroup: {
          'G-A': [ { student_id: 'S001', name: '김철수' }, { student_id: 'S002', name: '이영희' } ],
          'G-B': [ { student_id: 'S003', name: '박민수' } ]
        } };
    },
    loginStudent: function (studentId, pin) {
      if (pin === '1234') return { ok: true, token: 'mock-token', role: 'student',
        student: { student_id: studentId, name: '김철수', group_id: 'G-A' } };
      return { ok: false, message: 'PIN이 맞지 않아요. (4번 남음)' };
    },
    loginTeacher: function (pin) {
      if (pin === '9999') return { ok: true, token: 'mock-teacher', role: 'teacher' };
      return { ok: false, message: '관리자 PIN이 맞지 않습니다.' };
    },
    verifySession: function (token) {
      if (token === 'mock-token') return { ok: true, role: 'student', studentId: 'S001' };
      if (token === 'mock-teacher') return { ok: true, role: 'teacher' };
      return { ok: false };
    },
    getTodayDashboard: function () {
      return { ok: true, today: '2026-07-18',
        cards: [
          { item_id: 'AI-1', subject: '기사', label: 'Article 2 · 본문 녹음', seq: '', action_type: 'record', status: '재제출요청', due_date: '2026-07-17', due_time: '21:00', overdue: true },
          { item_id: 'AI-2', subject: '기사', label: 'Article 3 · 단어 듣기', seq: '', action_type: 'listen', status: '미시작', due_date: '2026-07-18', due_time: '21:00', overdue: false },
          { item_id: 'AI-3', subject: 'Voca', label: 'Voca 07 암송', seq: '1/3', action_type: 'record', status: '진행중', due_date: '2026-07-18', due_time: '21:00', overdue: false },
          { item_id: 'AI-4', subject: 'QnA', label: 'Q&A 서술형 답안', seq: '', action_type: 'write', status: '미시작', due_date: '2026-07-18', due_time: '21:00', overdue: false },
          { item_id: 'AI-5', subject: '리스닝', label: 'Unit 2 · p.14 듣기', seq: '', action_type: 'listen', status: '제출완료', due_date: '2026-07-18', due_time: '21:00', overdue: false }
        ],
        progress: { done: 1, total: 5 },
        points: { total: 275, todayAwards: [
          { label: '기본 제출 +10', amount: 10 }, { label: '정시 제출 +5', amount: 5 }, { label: 'A반 2등 제출 +5', amount: 5 }
        ] },
        tier: { current: 'Starter', next: 'Builder', progress: 275 / 300, need: 25 },
        streak: 5 };
    },
    _mockValid: 0,
    _silentWav: function (sec) {
      var rate = 8000, n = Math.floor(rate * sec);
      var buf = new ArrayBuffer(44 + n), v = new DataView(buf);
      var ws = function (o, s) { for (var i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
      ws(0, 'RIFF'); v.setUint32(4, 36 + n, true); ws(8, 'WAVEfmt '); v.setUint32(16, 16, true);
      v.setUint16(20, 1, true); v.setUint16(22, 1, true); v.setUint32(24, rate, true); v.setUint32(28, rate, true);
      v.setUint16(32, 1, true); v.setUint16(34, 8, true); ws(36, 'data'); v.setUint32(40, n, true);
      new Uint8Array(buf, 44).fill(128);
      return URL.createObjectURL(new Blob([buf], { type: 'audio/wav' }));
    },
    getListenData: function (token, itemId) {
      return { ok: true, item_id: itemId, subject: '기사', label: 'Article 3 · 단어 듣기',
        transcript: 'apple 사과\nbanana 바나나\ncherry 체리\n(mock 음원은 2초 무음입니다)',
        audio_url: this._silentWav(2), required: 2, valid_count: this._mockValid, status: '미시작' };
    },
    recordListenSession: function (token, itemId, startedAt, completed, skipped) {
      if (completed && !skipped) this._mockValid++;
      var done = this._mockValid >= 2;
      return { ok: true, valid_count: this._mockValid, required: 2,
        item_status: done ? '제출완료' : '진행중', just_completed: done && this._mockValid === 2 };
    }
  };
  return { call: function (fn, args, onOk) { setTimeout(function () { onOk(MOCK[fn].apply(MOCK, args || [])); }, 150); } };
})();

var App = (function () {
  var SESSION_KEY = 'cambridge_session';
  var bootstrap = null;
  var selGroup = null, selStudent = null;
  var pinBuffer = '', pinMode = 'student'; // 'student' | 'teacher'

  function $(id) { return document.getElementById(id); }
  function show(id) {
    ['screen-loading','screen-group','screen-name','screen-pin','screen-home','screen-dash','screen-listen'].forEach(function (s) {
      $(s).classList.toggle('hidden', s !== id);
    });
  }
  function saveSession(s) { localStorage.setItem(SESSION_KEY, JSON.stringify(s)); }
  function loadSession() {
    try { return JSON.parse(localStorage.getItem(SESSION_KEY)); } catch (e) { return null; }
  }

  function init() {
    var sess = loadSession();
    if (sess && sess.token) {
      Server.call('verifySession', [sess.token], function (res) {
        if (res.ok) { showHome(sess); } else { localStorage.removeItem(SESSION_KEY); loadBootstrap(); }
      }, function () {
        // 오프라인 등으로 검증 실패 시: 저장된 세션으로 일단 진입 (다음 온라인 요청에서 재검증)
        showHome(sess);
      });
    } else {
      loadBootstrap();
    }
  }

  function loadBootstrap() {
    show('screen-loading');
    Server.call('getLoginBootstrap', [], function (res) {
      bootstrap = res;
      renderGroups();
    });
  }

  function renderGroups() {
    var grid = $('group-grid');
    grid.innerHTML = '';
    bootstrap.groups.forEach(function (g) {
      var b = document.createElement('button');
      b.className = 'choice-btn';
      b.textContent = g.group_name;
      b.onclick = function () { selGroup = g; renderNames(); };
      grid.appendChild(b);
    });
    show('screen-group');
  }

  function renderNames() {
    $('name-title').textContent = selGroup.group_name + ' — 이름을 골라주세요';
    var grid = $('name-grid');
    grid.innerHTML = '';
    (bootstrap.studentsByGroup[selGroup.group_id] || []).forEach(function (s) {
      var b = document.createElement('button');
      b.className = 'choice-btn';
      b.textContent = s.name;
      b.onclick = function () { selStudent = s; showPin('student'); };
      grid.appendChild(b);
    });
    show('screen-name');
  }

  function showPin(mode) {
    pinMode = mode;
    pinBuffer = '';
    updateDots();
    $('pin-msg').textContent = '';
    if (mode === 'student') {
      $('pin-title').textContent = selStudent.name + ' — 비밀번호 4자리를 눌러주세요';
      $('pin-back').onclick = function () { renderNames(); };
    } else {
      $('pin-title').textContent = '관리자 PIN을 입력하세요';
      $('pin-back').onclick = function () { renderGroups(); };
    }
    renderPad();
    show('screen-pin');
  }

  function renderPad() {
    var pad = $('pin-pad');
    pad.innerHTML = '';
    ['1','2','3','4','5','6','7','8','9','지우기','0','전체삭제'].forEach(function (k) {
      var b = document.createElement('button');
      b.className = 'pin-key' + (isNaN(k) ? ' fn' : '');
      b.textContent = k;
      b.onclick = function () { onKey(k); };
      pad.appendChild(b);
    });
  }

  function updateDots() {
    var dots = document.querySelectorAll('.pin-dot');
    for (var i = 0; i < 4; i++) dots[i].classList.toggle('filled', i < pinBuffer.length);
  }

  function onKey(k) {
    if (k === '지우기') pinBuffer = pinBuffer.slice(0, -1);
    else if (k === '전체삭제') pinBuffer = '';
    else if (pinBuffer.length < 4) pinBuffer += k;
    updateDots();
    if (pinBuffer.length === 4) submitPin();
  }

  function submitPin() {
    $('pin-msg').textContent = '확인 중...';
    $('pin-msg').style.color = 'var(--muted)';
    var done = function (res) {
      if (res.ok) {
        var sess = { token: res.token, role: res.role };
        if (res.student) { sess.student = res.student; }
        saveSession(sess);
        showHome(sess);
      } else {
        pinBuffer = '';
        updateDots();
        $('pin-msg').style.color = 'var(--danger)';
        $('pin-msg').textContent = res.message || '다시 해보세요.';
      }
    };
    if (pinMode === 'student') Server.call('loginStudent', [selStudent.student_id, pinBuffer], done);
    else Server.call('loginTeacher', [pinBuffer], done);
  }

  function showHome(sess) {
    if (sess.role === 'teacher') {
      $('home-hello').textContent = '선생님, 안녕하세요!';
      $('home-note').textContent = '선생님 현황판(T-01~03)은 WBS 4.x에서 이 화면을 교체합니다.';
      show('screen-home');
    } else {
      loadDashboard(sess);
    }
  }

  // ===== S-01 오늘의 숙제 =====
  var ACTION_META = {
    listen: { icon: '🎧', label: '듣기' },
    record: { icon: '🎤', label: '녹음' },
    read:   { icon: '📖', label: '읽기' },
    write:  { icon: '📷', label: '사진 제출' }
  };
  var STATUS_CLASS = { '재제출요청': 'st-redo', '미시작': 'st-todo', '진행중': 'st-doing', '제출완료': 'st-done', '면제': 'st-done' };
  var STATUS_LABEL = { '재제출요청': '다시 제출!', '미시작': '시작하기', '진행중': '이어서 하기', '제출완료': '완료 ✓', '면제': '면제' };

  function loadDashboard(sess) {
    show('screen-loading');
    Server.call('getTodayDashboard', [sess.token], function (res) {
      if (!res.ok) {
        if (res.needLogin) { localStorage.removeItem(SESSION_KEY); loadBootstrap(); return; }
        alert(res.message || '불러오지 못했어요. 다시 해보세요.');
        return;
      }
      renderDashboard(sess, res);
    });
  }

  function renderDashboard(sess, d) {
    var dt = new Date(d.today + 'T00:00:00');
    var days = ['일', '월', '화', '수', '목', '금', '토'];
    $('dash-date').textContent = (dt.getMonth() + 1) + '월 ' + dt.getDate() + '일 ' + days[dt.getDay()] + '요일';
    $('dash-name').textContent = (sess.student ? sess.student.name : '') + ' 님, 오늘도 화이팅!';
    $('chip-point').textContent = '⭐ ' + d.points.total + 'P';
    $('chip-streak').textContent = d.streak > 0 ? '🔥 ' + d.streak + '일 연속' : '🌱 오늘부터 시작!';

    $('tier-cur').textContent = d.tier.current || 'Starter';
    $('tier-need').textContent = d.tier.next ? d.tier.next + '까지 ' + d.tier.need + 'P' : '최고 등급!';
    $('tier-fill').style.width = Math.round(Math.min(1, Math.max(0, d.tier.progress)) * 100) + '%';

    var awBox = $('awards-box');
    if (d.points.todayAwards.length) {
      awBox.classList.remove('hidden');
      $('awards-list').innerHTML = '';
      d.points.todayAwards.forEach(function (a) {
        var row = document.createElement('div');
        row.className = 'aw-row';
        var name = document.createElement('span');
        // display_label에 금액(+N)이 이미 있으면 떼고, 금액은 항상 amount 컬럼 기준으로 표시
        name.textContent = String(a.label).replace(/\s*\+\d+\s*P?\s*$/, '');
        var amt = document.createElement('b');
        amt.textContent = '+' + a.amount + 'P';
        row.appendChild(name); row.appendChild(amt);
        $('awards-list').appendChild(row);
      });
    } else {
      awBox.classList.add('hidden');
    }

    $('tp-count').textContent = d.progress.done + '/' + d.progress.total + ' 완료';
    $('tp-fill').style.width = d.progress.total ? Math.round(d.progress.done / d.progress.total * 100) + '%' : '0%';

    // 서버 정렬과 무관하게 화면에서도 상태 우선 정렬을 보장 (재제출요청→미시작→진행중→완료→면제)
    var ORDER = { '재제출요청': 0, '미시작': 1, '진행중': 2, '제출완료': 3, '면제': 4 };
    d.cards.sort(function (x, y) {
      var s = (ORDER[x.status] !== undefined ? ORDER[x.status] : 9) - (ORDER[y.status] !== undefined ? ORDER[y.status] : 9);
      return s !== 0 ? s : String(x.due_date).localeCompare(String(y.due_date));
    });
    var wrap = $('hw-cards');
    wrap.innerHTML = '';
    if (!d.cards.length) {
      var empty = document.createElement('div');
      empty.className = 'empty-note';
      empty.textContent = '오늘은 숙제가 없어요! 🎉\n푹 쉬어도 좋아요.';
      wrap.appendChild(empty);
    }
    d.cards.forEach(function (c) {
      var meta = ACTION_META[c.action_type] || ACTION_META.listen;
      var card = document.createElement('div');
      card.className = 'hw-card ' + (STATUS_CLASS[c.status] || 'st-todo');
      var icon = document.createElement('div');
      icon.className = 'hw-icon';
      icon.textContent = meta.icon;
      var main = document.createElement('div');
      main.className = 'hw-main';
      var subj = document.createElement('div');
      subj.className = 'hw-subject';
      subj.textContent = c.subject + ' · ' + meta.label;
      var label = document.createElement('div');
      label.className = 'hw-label';
      label.textContent = c.label + (c.seq ? ' (' + c.seq + ')' : '');
      var metaRow = document.createElement('div');
      metaRow.className = 'hw-meta';
      if (c.overdue) {
        var od = document.createElement('span');
        od.className = 'overdue';
        od.textContent = '마감 지남 · ';
        metaRow.appendChild(od);
      }
      metaRow.appendChild(document.createTextNode('마감 ' + (c.due_time || '21:00')));
      main.appendChild(subj); main.appendChild(label); main.appendChild(metaRow);
      var st = document.createElement('div');
      st.className = 'hw-status';
      st.textContent = STATUS_LABEL[c.status] || c.status;
      card.appendChild(icon); card.appendChild(main); card.appendChild(st);
      card.onclick = function () { openItem(c); };
      wrap.appendChild(card);
    });
    show('screen-dash');
  }

  function openItem(c) {
    if (c.status === '제출완료' || c.status === '면제') return;
    if (c.action_type === 'listen') { openListen(c); return; }
    var meta = ACTION_META[c.action_type] || ACTION_META.listen;
    alert(meta.label + ' 화면은 다음 업데이트에서 열려요!\n(' + c.label + ')');
  }

  // ===== S-02 듣기 학습 =====
  var Listen = { audio: null, itemId: null, sessionStart: null, maxReached: 0, skipped: false, playing: false, finished: false };

  function fmtTime(sec) {
    if (!isFinite(sec) || sec < 0) return '-:--';
    var m = Math.floor(sec / 60), s = Math.floor(sec % 60);
    return m + ':' + (s < 10 ? '0' : '') + s;
  }

  function openListen(c) {
    show('screen-loading');
    var sess = loadSession();
    Server.call('getListenData', [sess.token, c.item_id], function (res) {
      if (!res.ok) {
        if (res.needLogin) { localStorage.removeItem(SESSION_KEY); loadBootstrap(); return; }
        alert(res.message || '불러오지 못했어요.');
        loadDashboard(sess);
        return;
      }
      setupListen(res);
    });
  }

  function setupListen(d) {
    Listen.itemId = d.item_id;
    Listen.sessionStart = null;
    Listen.maxReached = 0;
    Listen.skipped = false;
    Listen.playing = false;
    Listen.finished = false;

    $('ls-subject').textContent = d.subject;
    $('ls-title').textContent = d.label;
    $('ls-count').textContent = d.valid_count;
    $('ls-required').textContent = d.required;
    var tr = $('ls-transcript');
    if (d.transcript) { tr.textContent = d.transcript; tr.classList.remove('empty'); }
    else { tr.textContent = '🎵 음원을 들으며 따라 읽어보세요'; tr.classList.add('empty'); }
    $('ls-msg').textContent = '';
    $('ls-msg').className = 'ls-msg';
    $('ls-fill').style.width = '0%';
    $('ls-cur').textContent = '0:00';
    $('ls-dur').textContent = '-:--';
    $('ls-play').textContent = '▶';
    $('ls-play').disabled = false;

    if (Listen.audio) { Listen.audio.pause(); Listen.audio.src = ''; }
    var audio = new Audio();
    audio.preload = 'metadata';
    audio.src = d.audio_url;
    Listen.audio = audio;

    // OS 미디어 컨트롤의 탐색 버튼 미등록 (설계결정문서 5.3 — MediaSession seek 핸들러 등록 안 함)
    if ('mediaSession' in navigator) {
      ['seekbackward', 'seekforward', 'seekto'].forEach(function (a) {
        try { navigator.mediaSession.setActionHandler(a, null); } catch (e) {}
      });
    }

    audio.addEventListener('loadedmetadata', function () { $('ls-dur').textContent = fmtTime(audio.duration); });
    audio.addEventListener('timeupdate', function () {
      if (audio.currentTime > Listen.maxReached) Listen.maxReached = audio.currentTime;
      if (audio.duration) $('ls-fill').style.width = Math.min(100, audio.currentTime / audio.duration * 100) + '%';
      $('ls-cur').textContent = fmtTime(audio.currentTime);
    });
    // UI 차단을 우회한 앞으로 건너뛰기 감지 (2차 안전장치). 되감기는 허용
    audio.addEventListener('seeking', function () {
      if (audio.currentTime > Listen.maxReached + 1.0) Listen.skipped = true;
    });
    audio.addEventListener('ended', function () { onListenEnded(); });
    audio.addEventListener('error', function () {
      $('ls-msg').textContent = '음원을 불러올 수 없어요. 선생님께 알려주세요.';
      $('ls-msg').className = 'ls-msg bad';
      $('ls-play').disabled = true;
    });

    $('ls-play').onclick = function () {
      if (Listen.playing) {
        audio.pause();
        Listen.playing = false;
        $('ls-play').textContent = '▶';
      } else {
        if (!Listen.sessionStart) Listen.sessionStart = new Date();
        audio.play();
        Listen.playing = true;
        $('ls-play').textContent = '⏸';
        $('ls-msg').textContent = '';
        $('ls-msg').className = 'ls-msg';
      }
    };
    $('ls-restart').onclick = function () {
      // 처음부터 = 새 세션 시작 (되감기 허용, 이전 진행은 기록하지 않음)
      audio.currentTime = 0;
      Listen.maxReached = 0;
      Listen.skipped = false;
      Listen.sessionStart = new Date();
      if (!Listen.playing) { audio.play(); Listen.playing = true; $('ls-play').textContent = '⏸'; }
    };
    show('screen-listen');
  }

  function pad2(n) { return (n < 10 ? '0' : '') + n; }
  function tsStr(d) {
    return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate()) + ' ' +
      pad2(d.getHours()) + ':' + pad2(d.getMinutes()) + ':' + pad2(d.getSeconds());
  }

  function onListenEnded() {
    Listen.playing = false;
    Listen.finished = true;
    $('ls-play').textContent = '▶';
    $('ls-msg').textContent = '기록 중...';
    var sess = loadSession();
    var started = Listen.sessionStart ? tsStr(Listen.sessionStart) : tsStr(new Date());
    Server.call('recordListenSession', [sess.token, Listen.itemId, started, true, Listen.skipped], function (res) {
      if (!res.ok) {
        $('ls-msg').textContent = res.message || '기록에 실패했어요. 한 번 더 들어주세요.';
        $('ls-msg').className = 'ls-msg bad';
        return;
      }
      $('ls-count').textContent = res.valid_count;
      $('ls-required').textContent = res.required;
      if (res.just_completed) {
        $('ls-msg').textContent = '🎉 유효 듣기 달성! 오늘의 숙제로 돌아가요';
        $('ls-msg').className = 'ls-msg good';
        setTimeout(function () { loadDashboard(sess); }, 1600);
      } else if (Listen.skipped) {
        $('ls-msg').textContent = '건너뛰기가 감지돼 이번 회차는 인정되지 않았어요. 처음부터 다시!';
        $('ls-msg').className = 'ls-msg bad';
        Listen.skipped = false;
        Listen.maxReached = 0;
        Listen.sessionStart = null;
      } else {
        $('ls-msg').textContent = '✅ 유효 듣기 1회 완료! (' + res.valid_count + '/' + res.required + ')';
        $('ls-msg').className = 'ls-msg good';
        Listen.sessionStart = null;
        Listen.maxReached = 0;
      }
    });
  }

  function closeListen() {
    if (Listen.playing && !Listen.finished) {
      if (!confirm('아직 다 듣지 않았어요. 지금 나가면 이번 듣기는 인정되지 않아요. 나갈까요?')) return;
    }
    if (Listen.audio) { Listen.audio.pause(); }
    loadDashboard(loadSession());
  }

  function logout() {
    localStorage.removeItem(SESSION_KEY);
    selGroup = selStudent = null;
    if (bootstrap) renderGroups(); else loadBootstrap();
  }

  return {
    init: init,
    showGroups: renderGroups,
    showTeacherLogin: function () { showPin('teacher'); },
    closeListen: closeListen,
    logout: logout
  };
})();

App.init();

// ===== 서비스워커 등록 (PWA 설치·오프라인 셸) =====
if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
